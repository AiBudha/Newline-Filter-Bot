services:
  - type: web
    name: newline-movies-bot
    env: python
    runtime: python3
    buildCommand: pip install -r requirements.txt
    startCommand: python bot.py
    plan: free
    region: oregon
    healthCheckPath: /
    envVars:
      - key: PYTHON_VERSION
        value: 3.10.0
      - key: PORT
        sync: false
        default: 8080
